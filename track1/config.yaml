# config-16k-b5-dnsmos17s.yaml — ★ THE #1 DNSMOS LEVER (clean ablation, 2026-06-25).
# = config-16k-b5-matchlen17s-dmo-enrollfix.yaml (warm b5/temp_best 290 STRICT, DMO base
#   = SI-SNR + energy250 + ecapa5, lr2e-5 HARD-LAW, 17s=272000 matchlen data, enroll-fix
#   eval-length-matched enrollment, grad_checkpoint True, W=24, n_fft128 => 85.6ms latency)
#   with ONLY ONE addition:
#     ★ dnsmos_w: 2.0  -> add dnsmos_w * DnsmosLoss(est, active_mask)['loss'] (= -mean OVRL).
#       Minimizing it MAXIMIZES the official DNSMOS OVRL. sig_bak_ovr.onnx via onnx2torch,
#       differentiable, TRAIN-TIME ONLY (not a generator submodule, not saved -> arch/latency
#       UNCHANGED). active_mask = speech-active frames (energy floor = f1_tau) so the model
#       cannot game DNSMOS by emitting silence.
#   NO GAN / NO WavLM / NO OA (those terms are weight-independent / broken per Mac's audit):
#     gan_adv_w / gan_fm_w / wavlm_w / oa_w all default 0 (omitted == 0 in Trainer_dnsmos).
#   Silent-target gating fix (audit #3) is BUILT INTO Trainer_dnsmos: ECAPA(+OA) zeroed on
#   rms(source)<1e-4 samples, SI-SNR silent samples excluded from valid (ckpt) selection.
# Anchored to b5's DNSMOS 1.731 (warm b5/temp_best), NOT the DMO floor 1.585.
# Run via train_dnsmos.py + Trainer_dnsmos. SEPARATE exp_dir chkpt/usef_b5_dnsmos17s.
# Usage: CUDA_VISIBLE_DEVICES=5 bash launch_b5_dnsmos17s.sh   (GPU5 freed). ~7.8h/epoch + DNSMOS ~52ms/iter.
optimizer: !name:torch.optim.Adam
    lr: 0.00002
    weight_decay: 0
checkpoint: 1
continue_from: ''
init_from: /data/home/kts123/realtse/usef_lookahead/chkpt/chkpt/usef_lookahead_b5/temp_best.pth.tar
max_norm: 5
print_freq: 50
name: chkpt/usef_b5_dnsmos17s_recreate
# ★ frequent saves (Mac, 2pm card): iter500/1000/1500/2000 ckpts for the early DEV read.
#   keep=8 so all early iter-ckpts survive pruning through epoch1.
iter_ckpt_freq: 500
iter_ckpt_keep: 8
enroll_fix: true
eval_dur_cache: /data/home/kts123/realtse/h100_track2_incoming/extracted/track2_manifest/eval_dur_cache.npz
# --- DMO base (proven safe main card): SI-SNR (recon) + energy250 + ecapa5 ---
f1_energy_alpha: 250.0
f1_silero_alpha: 0.0
f1_ecapa_beta: 5.0
f1_tau: 0.0001
f1_silent_floor_db: -40.0
f1_guard_win: 8
# --- ★ Differentiable DNSMOS loss (the lever). active_tau defaults to f1_tau if omitted. ---
dnsmos_w: 2.0
dnsmos_onnx: /data/home/kts123/realtse/compliance_share/scoring_kit/code/DNSMOS/sig_bak_ovr.onnx
dnsmos_active_tau: 0.0001
# --- NO adversarial / WavLM / OA (broken; all 0) ---
gan_adv_w: 0.0
gan_fm_w: 0.0
wavlm_w: 0.0
oa_w: 0.0
augment: true
aug_seed: 3407
epochs: 10
batch_size: 1
# ★ num_workers 2->6 (Mac throughput): iter is dataloader-bound (3.8s/iter vs 0.05s compute).
#   64-core box has headroom. CAVEAT: if disk-I/O bound (not CPU), revert to 2 — verified by
#   comparing sec/iter post-relaunch vs the 3.8s baseline.
num_workers: 6
valid_batch_size: 1
num_spks: 1
duration: 17
sample_rate: 16000
train_path: /data/home/kts123/realtse/usef_lookahead/data_campaign_v2_matchlen/train
valid_path: /data/home/kts123/realtse/usef_lookahead/data_campaign_v2_matchlen/valid
test_path: /data/home/kts123/realtse/usef_lookahead/data_campaign_v2_matchlen/valid
mix_scp: mix.scp
ref_scp: ref.scp
# ★ aux12s_disjoint = 12s DISJOINT enrollment of the target speaker -> lets the enroll-fix
#   dataset realise the FULL eval [3,12]s enroll-length distribution (the 5s aux.scp caps at
#   [3,5]s; prompt's "enroll-fix (aux12s_disjoint)").
aux_scp: aux12s_disjoint.scp
out_channels: 256
STFT: !new:utils.feature.STFT
    n_fft: 128
    hop_length: 64
    win_length: 128
iSTFT: !new:utils.feature.iSTFT
    n_fft: 128
    hop_length: 64
    win_length: 128
real_att: !new:models.local.TFgridnet.TF_gridnet_attentionblock
    emb_dim: 128
    n_freqs: 65
    n_head: 4
    approx_qk_dim: 512
MaskNet: !new:models.model_USEF_TFGridNet.Tar_Model
    stft: !ref <STFT>
    istft: !ref <iSTFT>
    real_att: !ref <real_att>
    n_freqs: 65
    hidden_channels: 256
    n_head: 4
    emb_dim: 128
    emb_ks: 1
    emb_hs: 1
    num_layers: 6
    p_rnn: True
    p_attn: True
    p_conv: True
    p_norm: True
    p_inorm: True
    inter_block: 24
    grad_checkpoint: True
modules:
    masknet: !ref <MaskNet>
